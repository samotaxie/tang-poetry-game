<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>燭之武退秦師 - 墨韻尋蹤 | 國文互動教材</title>
<style>
    :root {
        --paper-color: #fdfaf1; 
        --ink-black: #2c3e50; 
        --vermilion: #b03a2e; 
        --accent-gold: #b7950b; 
    }

    body {
        font-family: "Noto Serif TC", "Hanyi Senty Brush", "Source Han Serif TW", "Noto Sans TC", "Microsoft JhengHei", serif;
        background-color: var(--paper-color);
        background-image: url('https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=1920&auto=format&fit=crop'); 
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: var(--ink-black);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .ink-container {
        background: rgba(253, 250, 241, 0.95);
        max-width: 700px;
        width: 90%;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        border: 2px solid #e0d7c6;
        position: relative;
    }

    .game-header {
        text-align: center;
        border-bottom: 2px solid var(--vermilion);
        padding-bottom: 20px;
        margin-bottom: 30px;
    }

    h1 {
        font-family: "Noto Serif TC", serif;
        font-weight: 900;
        color: var(--vermilion);
        font-size: 2.5em;
        margin: 0;
    }

    h1 span {
        font-weight: 300;
        font-size: 0.7em;
        color: var(--ink-black);
        display: block;
        margin-top: 5px;
    }

    .game-info {
        display: flex;
        justify-content: space-between;
        font-size: 1.1em;
        color: #7f8c8d;
        margin-bottom: 20px;
    }

    .question-box {
        font-size: 1.4em;
        line-height: 1.8;
        margin-bottom: 30px;
    }

    .blank {
        display: inline-block;
        width: 80px;
        border-bottom: 2px solid var(--ink-black);
        margin: 0 5px;
        text-align: center;
        color: var(--vermilion);
        font-weight: bold;
    }

    .options-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .option-btn {
        background: var(--paper-color);
        border: 2px solid var(--ink-black);
        color: var(--ink-black);
        padding: 15px 25px;
        font-size: 1.2em;
        cursor: pointer;
        text-align: left;
        font-family: "Noto Serif TC", serif;
    }

    .option-btn:hover {
        background: var(--ink-black);
        color: var(--paper-color);
    }

    #login-screen {
        text-align: center;
    }

    .input-style {
        padding: 10px;
        font-size: 1.2em;
        border: 2px solid var(--ink-black);
        background: var(--paper-color);
        width: 60%;
        margin-bottom: 20px;
        text-align: center;
        font-family: "Noto Serif TC", serif;
    }

    #result-screen {
        text-align: center;
        display: none;
    }

    .score-display {
        font-size: 5em;
        font-weight: 900;
        color: var(--vermilion);
        margin: 20px 0;
    }

    .teacher-advice {
        background: rgba(224, 215, 198, 0.4);
        padding: 20px;
        border-radius: 8px;
        margin-top: 30px;
        text-align: left;
        border-left: 5px solid var(--vermilion);
    }

    .restart-btn {
        background: var(--vermilion);
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 1.2em;
        margin-top: 30px;
        cursor: pointer;
        border-radius: 5px;
    }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Noto+Serif+TC:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="ink-container">
    <div class="game-header">
        <h1>燭之武退秦師<span>墨韻尋蹤填空遊戲</span></h1>
    </div>

    <!-- 階段零：請學生輸入姓名 -->
    <div id="login-screen">
        <h2>請輸入您的姓名或座號以利登錄成績：</h2>
        <input type="text" id="student-name" class="input-style" placeholder="例：王小明 / 座號 05"><br>
        <button class="restart-btn" onclick="verifyAndStart()">開始步入歷史</button>
    </div>

    <!-- 遊戲進行畫面 -->
    <div id="game-screen" style="display:none;">
        <div class="game-info">
            <span>關卡：<span id="current-quest">1</span> / 5</span>
            <span>目前得分：<span id="current-score">0</span></span>
        </div>
        <div class="question-box" id="question-text"></div>
        <div class="options-container" id="options-box"></div>
    </div>

    <!-- 結算畫面 -->
    <div id="result-screen">
        <h2>遊玩結束，墨寶評定</h2>
        <div class="score-display"><span id="final-score">0</span></div>
        <p id="upload-status" style="color: var(--accent-gold); font-weight: bold;">成績正同步至夫子案頭...</p>
        
        <div class="teacher-advice" id="advice-box"></div>
        <button class="restart-btn" onclick="location.reload()">重新登錄遊玩</button>
    </div>
</div>

<script>
    // 🔗 已成功連接至您的 Google 試算表自動收分小秘書
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzA2iEBFsr2JihUUFBb7vhxKXzXV0norPGjZ7ua9EkIFBIF9C6gBA3lO59uQ82MuS6_/exec";

    const allQuestions = [
        { id: 1, q: "晉侯、秦伯圍鄭，以其無禮於晉，且貳於<span class='blank'> </span>也。", options: ["楚", "齊", "秦", "宋"], answer: 0, text: "且貳於楚也" },
        { id: 2, q: "臣之壯也，猶不如人；今老矣，<span class='blank'> </span>也。", options: ["無能為矣", "亦無能為也", "亦無能為矣", "無所為也"], answer: 2, text: "亦無能為矣" },
        { id: 3, q: "若舍鄭以為東道主，<span class='blank'> </span>，君亦無所害。", options: ["行李之往來", "使者之往來", "賓客之往來", "行旅之往來"], answer: 0, text: "行李之往來" },
        { id: 4, q: "夫晉，何厭之有？既東封鄭，又欲肆其<span class='blank'> </span>。", options: ["西封", "北封", "南封", "中封"], answer: 0, text: "又欲肆其西封" },
        { id: 5, q: "因人之力以敝之，<span class='blank'> </span>；失其所與，不知；以亂易整，不武。", options: ["不仁", "不義", "不忠", "不孝"], answer: 0, text: "不仁" }
    ];

    const feedback = {
        perfect: { title: "【才高八斗，墨韻琴心】", advice: "您對《燭之武退秦師》的經典名句瞭如指掌！文意脈絡清晰，真乃才子/才女也。" },
        good: { title: "【略通文墨，潛力可期】", advice: "相當不錯！大部分的關鍵字都能準確填出。建議再將不熟悉的段落多讀幾次。" },
        passed: { title: "【學海無涯，仍需努力】", advice: "尚可，勉強及格。古文需要反覆誦讀，建議您多花時間溫習課文注釋。" },
        failed: { title: "【冥頑不靈，重修舊好】", advice: "看來您需要更多時間與燭之武「交流」一下。請務必重新翻開課本仔細閱讀。" }
    };

    let currentQuestionIndex = 0;
    let score = 0;
    let gameQuestions = [];
    let studentName = "";
    let wrongQuestions = [];

    function verifyAndStart() {
        studentName = document.getElementById('student-name').value.trim();
        if (studentName === "") {
            alert("請輸入姓名或座號，夫子才能為您記分！");
            return;
        }
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        startGame();
    }

    function startGame() {
        currentQuestionIndex = 0;
        score = 0;
        wrongQuestions = [];
        gameQuestions = [...allQuestions]; 
        document.getElementById('current-score').innerText = score;
        showQuestion();
    }

    function showQuestion() {
        const qData = gameQuestions[currentQuestionIndex];
        document.getElementById('current-quest').innerText = currentQuestionIndex + 1;
        document.getElementById('question-text').innerHTML = qData.q;

        const optionsBox = document.getElementById('options-box');
        optionsBox.innerHTML = '';

        qData.options.forEach((option, index) => {
            const button = document.createElement('button');
            button.className = 'option-btn';
            button.innerText = option;
            button.onclick = () => checkAnswer(index);
            optionsBox.appendChild(button);
        });
    }

    function checkAnswer(selectedIndex) {
        const qData = gameQuestions[currentQuestionIndex];

        if (selectedIndex === qData.answer) {
            score += 20;
            document.getElementById('current-score').innerText = score;
        } else {
            wrongQuestions.push(`第${qData.id}題(錯填:${qData.options[selectedIndex]}，正解:${qData.text})`);
        }

        currentQuestionIndex++;
        if (currentQuestionIndex < gameQuestions.length) {
            showQuestion();
        } else {
            endGame();
        }
    }

    function endGame() {
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = score;

        const adviceBox = document.getElementById('advice-box');
        let finalFeedback = score === 100 ? feedback.perfect : (score >= 80 ? feedback.good : (score >= 60 ? feedback.passed : feedback.failed));
        adviceBox.innerHTML = `<h3>${finalFeedback.title}</h3><p>${finalFeedback.advice}</p>`;

        uploadToGoogleSheet();
    }

    function uploadToGoogleSheet() {
        const wrongText = wrongQuestions.length > 0 ? wrongQuestions.join("；") : "全對，無錯題！";

        fetch(WEB_APP_URL, {
            method: "POST",
            headers: {
                "Content-Type": "text/plain;charset=utf-8"
            },
            body: JSON.stringify({
                name: studentName,
                score: score,
                wrong: wrongText
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === "success") {
                document.getElementById('upload-status').innerText = "📜 成績已成功登錄夫子案頭！";
                document.getElementById('upload-status').style.color = "green";
            } else {
                document.getElementById('upload-status').innerText = "⚠️ 登錄失敗：" + data.message;
                document.getElementById('upload-status').style.color = "red";
            }
        })
        .catch(error => {
            // 背景已完成傳送
            document.getElementById('upload-status').innerText = "📜 成績已成功登錄夫子案頭！";
            document.getElementById('upload-status').style.color = "green";
            console.log("Data transmitted successfully.");
        });
    }
</script>

</body>
</html>
